<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="keywords" content="">
	<link rel="stylesheet" href="css/libs.min.css">
	<link rel="stylesheet" href="css/style.min.css">
	<title>Новый проект</title>
</head>


<body>
	<div class="wrapper">
		<main class="content">
			<section class="new-project">
				<div class="container">
					<div class="new-project__inner">
						<div class="new-project__title-wrap">
							<div class="new-project__title">Новый проект</div>
						</div>
						<div class="language__select custom_select">
							<select>
								<option value="">Russian</option>
								<option value="">English</option>
							</select>
						</div>
						<div class="new-project__cards">
							<div class="new-project__card active-project">
								<div class="new-project__card-img">
									<img src="img/project-img.webp" alt="">
								</div>
								<div class="new-project__card-text">Intro To Квантум</div>
							</div>
							<div class="new-project__card">
								<div class="new-project__card-img">
									<img src="img/project-img.webp" alt="">
								</div>
								<div class="new-project__card-text">Blank</div>
							</div>
							<div class="new-project__card">
								<div class="new-project__card-img">
									<img src="img/project-img.webp" alt="">
								</div>
								<div class="new-project__card-text">First Person</div>
							</div>
							<div class="new-project__card">
								<div class="new-project__card-img">
									<img src="img/project-img.webp" alt="">
								</div>
								<div class="new-project__card-text">Third Person</div>
							</div>
							<div class="new-project__card">
								<div class="new-project__card-img">
									<img src="img/project-img.webp" alt="">
								</div>
								<div class="new-project__card-text">Top Down</div>
							</div>
							<div class="new-project__card">
								<div class="new-project__card-img">
									<img src="img/project-img.webp" alt="">
								</div>
								<div class="new-project__card-text">Handheld AR</div>
							</div>
							<div class="new-project__card">
								<div class="new-project__card-img">
									<img src="img/project-img.webp" alt="">
								</div>
								<div class="new-project__card-text">Virtual Reality</div>
							</div>
							<div class="new-project__card">
								<div class="new-project__card-img">
									<img src="img/project-img.webp" alt="">
								</div>
								<div class="new-project__card-text">Vehicle</div>
							</div>
						</div>
						<div class="form">
							<div class="form-group">
								<div class="form-group__input">
									<label>Имя проекта</label>
									<input type="text">
								</div>
								<div class="error">
									<span class="error-icon">
										<img src="img/error.svg" alt="">
									</span>
									<span class="error-text">Необходимо указать имя проекта</span>
								</div>
							</div>
							<div class="form-btns">
								<button class="form-btn btn btn-blue">
									<span class="btn-text">Создать</span>
								</button>
								<button class="form-btn btn btn-blue__outline">
									<span class="btn-text">Отмена</span>
								</button>
							</div>
						</div>
					</div>
				</div>
			</section>
		</main>
	</div>
	<script src="js/libs.min.js"></script>
<script src="js/main.min.js"></script>
<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
</body>

</html>
